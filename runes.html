<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Runes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
    <div class="logo">Infinite Mining Incremental 2 ⛏️</div>
    <nav>
        <a href="index.html">HOME</a>
        <a href="guides.html">GUIDE</a>
        <a href="runes.html">RUNES</a>
        <a href="calculator.html">PLACE HOLDER</a>
    </nav>
</header>

<section class="hero">
    <h1>Runes</h1>
    <p>Click a rune to view all the stats</p>
</section>

<section class="content rune-grid">

    <div class="rune-card" onclick="openRune('PLACE HOLDER', 11, 'PLACE HOLDER')">
        <h2>PLACE HOLDER</h2>
        <img src="images/runes/PLACE HOLDER.png" alt="PLACE HOLDER">
        <p>Click to view stats</p>
    </div>

    <div class="rune-card" onclick="openRune('PLACE HOLDER', 11, 'PLACE HOLDER')">
        <h2>PLACE HOLDER</h2>
        <img src="images/runes/PLACE HOLDER.png" alt="PLACE HOLDER">
        <p>Click to view stats</p>
    </div>

</section>

<div id="popup" class="popup" onclick="closePopup(event)">
    <div class="popup-content" onclick="event.stopPropagation()">
        <span class="close" onclick="forceClosePopup()">&times;</span>
        <h2 id="popup-title">Rune Details</h2>
        <div id="popup-images"></div>
    </div>
</div>

<script>
function openRune(rune, imageCount, displayName) {
    const popup = document.getElementById("popup");
    const popupTitle = document.getElementById("popup-title");
    const container = document.getElementById("popup-images");

    popupTitle.textContent = displayName;
    container.innerHTML = "";

    for (let i = 1; i <= imageCount; i++) {
        const img = document.createElement("img");
        img.src = `images/rune-details/${rune}/${i}.png`;
        img.alt = `${displayName} detail ${i}`;
        img.className = "popup-img";
        container.appendChild(img);
    }

    popup.style.display = "flex";
}

function forceClosePopup() {
    document.getElementById("popup").style.display = "none";
}

function closePopup(event) {
    if (event.target.id === "popup") {
        forceClosePopup();
    }
}
</script>

</body>
</html>
